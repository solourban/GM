<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>낙찰노트 | 경매 입찰 검토 도구</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/" aria-label="낙찰노트 홈">
      <div class="brand-mark" aria-hidden="true">⌂</div>
      <div class="brand-text">
        <h1>낙찰노트</h1>
        <p>입찰 검토 도구</p>
      </div>
    </a>
  </div>
</header>

<section class="hero">
  <div class="container hero-inner">
    <div class="hero-copy">
      <div class="hero-eyebrow">입찰 전, 위험을 먼저 확인하세요</div>
      <h2 class="hero-title">
        오늘 볼 물건부터 고르고,<br>
        <em>입찰 전 위험까지 한 번에 확인</em>
      </h2>
      <p class="hero-sub">
        사건 조회, 권리분석, 시세 확인, 자금 검토까지<br>
        입찰 전에 필요한 내용을 한 화면에서 정리합니다.
      </p>
    </div>

    <div class="search-box">
      <div class="search-title">
        <span class="search-icon">⌕</span>
        <div>
          <b>사건 검색</b>
          <p>법원과 사건번호를 입력하면 기본정보부터 불러옵니다.</p>
        </div>
      </div>
      <div class="search-row">
        <label class="field court-field">
          <span>법원</span>
          <select id="jiwonNm">
            <option>서울중앙지방법원</option>
            <option>서울동부지방법원</option>
            <option>서울서부지방법원</option>
            <option>서울남부지방법원</option>
            <option>서울북부지방법원</option>
            <option>수원지방법원</option>
            <option>성남지원</option><option>여주지원</option><option>평택지원</option>
            <option>안산지원</option><option>안양지원</option><option>고양지원</option><option>부천지원</option>
            <option>인천지방법원</option>
            <option>의정부지방법원</option>
            <option>대전지방법원</option>
            <option>천안지원</option>
            <option>청주지방법원</option>
            <option>부산지방법원</option>
            <option>부산지방법원 동부지원</option>
            <option>부산지방법원 서부지원</option>
            <option>대구지방법원</option>
            <option>울산지방법원</option>
            <option>창원지방법원</option>
            <option>광주지방법원</option>
            <option>전주지방법원</option>
            <option>춘천지방법원</option>
            <option>제주지방법원</option>
          </select>
        </label>
        <label class="field year-field">
          <span>연도</span>
          <input id="saYear" type="text" value="2024" inputmode="numeric">
        </label>
        <label class="field case-field">
          <span>사건번호</span>
          <div class="case-input-wrap">
            <span class="sep">타경</span>
            <input id="saSer" type="text" placeholder="예: 110754" inputmode="numeric">
          </div>
        </label>
        <button id="btnFetch" class="btn-primary">기본정보 가져오기</button>
      </div>
      <p class="search-hint">Step 1 — 대법원 경매정보에서 사건 기본정보를 수집합니다.</p>
    </div>
  </div>
</section>

<section class="results-section container" id="resultsSection"></section>

<footer class="site-footer">
  <p>본 도구는 학습·참고용이며 법률 자문을 대체하지 않습니다.</p>
  <p class="muted">분석 로직은 주택임대차보호법·민사집행법 일반원칙 기반. 실제 입찰 전 원본 서류 재확인 필수.</p>
</footer>

<script src="/app.js"></script>
<script src="/home-tabs-patch.js"></script>
</body>
</html>
